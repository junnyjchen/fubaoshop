<script>
function deleteWish(id) {
    if (!confirm('確定要刪除嗎？')) return;
    
    $.ajax({
        url: '<?php echo MyUrl("admin/wish/delete"); ?>',
        type: 'POST',
        data: { id: id },
        success: function(res) {
            if (res.code == 0) {
                location.reload();
            } else {
                alert(res.msg || '操作失敗');
            }
        }
    });
}
</script>
