<html lang="zh-CN">
<head>

  <style>

      --talu-black: #1a1a2e;

  <script>
    const API_BASE = '/index/api_ai_chat';
    const AI_AVATAR = '{$ai_config.ai_avatar|default="☯"}';
    const AI_NAME = '{$ai_config.ai_name|default="道玄"}';
    
    let messages = [];
    let currentMode = 'chat';
    let sessionId = 'talu-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    let isLoading = false;
    let typingSpeed = 20; // 打字速度(ms/字)

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      initModeSelector();
      initInput();
      loadSession();
    });

    // 模式切换
    function initModeSelector() {
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentMode = btn.dataset.mode;
          document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          showModeHint();
        });
      });
    }

    // 显示模式提示
    function showModeHint() {
      const hints = {
        chat: '切换到道法闲聊模式',
        bazi: '切换到八字命理模式',
        fulu: '切换到觅智知识模式',
        fengshui: '切换到风水调理模式',
        fashi: '切换到开光法器模式'
      };
      // 可以添加提示动画
    }

    // 输入处理
    function initInput() {
      const input = document.getElementById('userInput');
      const sendBtn = document.getElementById('sendBtn');

      sendBtn.addEventListener('click', sendMessage);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 150) + 'px';
      });
    }

    // 发送消息
    async function sendMessage() {
      const input = document.getElementById('userInput');
      const content = input.value.trim();
      if (!content || isLoading) return;

      input.value = '';
      input.style.height = 'auto';
      
      hideWelcome();
      hideQuickQuestions();
      addMessage('user', content, new Date());
      saveSession();

      isLoading = true;
      document.getElementById('sendBtn').disabled = true;
      showTyping();

      try {
        const formData = new FormData();
        formData.append('message', content);
        formData.append('session_id', sessionId);
        formData.append('mode', currentMode);

        const res = await fetch(API_BASE + '/chat', {
          method: 'POST',
          headers: { 'X-Requested-With': 'XMLHttpRequest' },
          body: formData
        });
        const data = await res.json();

        hideTyping();
        if (data.code === 0) {
          await addMessageWithTyping('assistant', data.data.content, new Date());
        } else {
          addMessage('assistant', '抱歉，道玄暂时无法回应，请稍后再试。', new Date());
        }
      } catch (err) {
        hideTyping();
        addMessage('assistant', '抱歉，道玄暂时无法回应，请稍后再试。', new Date());
      } finally {
        isLoading = false;
        document.getElementById('sendBtn').disabled = false;
        saveSession();
      }
    }

    // 打字机效果添加消息
    function addMessageWithTyping(role, content, time) {
      return new Promise((resolve) => {
        messages.push({ role, content, time });
        
        const html = `
          <div class="message message--${role}">
            <div class="message__avatar">${role === 'assistant' ? AI_AVATAR : '◈'}</div>
            <div class="message__content" id="typingContent">
              <span class="typing-cursor"></span>
            </div>
          </div>
        `;
        
        document.getElementById('messages').insertAdjacentHTML('beforeend', html);
        scrollToBottom();
        
        const contentEl = document.querySelector('#typingContent');
        let index = 0;
        
        function typeNextChar() {
          if (index < content.length) {
            const char = content[index];
            const cursor = contentEl.querySelector('.typing-cursor');
            if (cursor) {
              cursor.insertAdjacentText('beforebegin', char);
            }
            index++;
            scrollToBottom();
            setTimeout(typeNextChar, typingSpeed);
          } else {
            // 打字完成，移除光标
            const cursor = contentEl.querySelector('.typing-cursor');
            if (cursor) {
              cursor.insertAdjacentHTML('afterend', `<span class="message__time">${formatTime(time)}</span>`);
              cursor.remove();
            }
            resolve();
          }
        }
        
        typeNextChar();
      });
    }

    // 快捷提问
    function askQuestion(question) {
      document.getElementById('userInput').value = question;
      document.getElementById('userInput').focus();
    }

    // 添加消息
    function addMessage(role, content, time) {
      messages.push({ role, content, time });
      
      const html = `
        <div class="message message--${role}">
          <div class="message__avatar">${role === 'assistant' ? AI_AVATAR : '◈'}</div>
          <div class="message__content">${formatContent(content)}<span class="message__time">${formatTime(time)}</span></div>
        </div>
      `;
      
      document.getElementById('messages').insertAdjacentHTML('beforeend', html);
      scrollToBottom();
    }

    // 格式化内容
    function formatContent(content) {
      let formatted = content
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      formatted = formatted.replace(/```[\s\S]*?```/g, m => '<pre>' + m.slice(3, -3) + '</pre>');
      formatted = formatted.replace(/`([^`]+)`/g, '<code>$1</code>');
      formatted = formatted.replace(/\n/g, '<br>');
      return formatted;
    }

    // 格式化时间
    function formatTime(date) {
      if (!date) return '';
      const d = new Date(date);
      return d.getHours().toString().padStart(2, '0') + ':' + 
             d.getMinutes().toString().padStart(2, '0');
    }

    // 打字指示器
    function showTyping() {
      const html = `
        <div class="message message--assistant" id="typingIndicator">
          <div class="message__avatar">${AI_AVATAR}</div>
          <div class="typing-indicator"><span></span><span></span><span></span></div>
        </div>
      `;
      document.getElementById('messages').insertAdjacentHTML('beforeend', html);
      scrollToBottom();
    }

    function hideTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    function hideWelcome() {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.style.display = 'none';
    }

    function hideQuickQuestions() {
      const quick = document.getElementById('quickQuestions');
      if (quick) quick.style.display = 'none';
    }

    function scrollToBottom() {
      const el = document.getElementById('messages');
      el.scrollTop = el.scrollHeight;
    }

    // 清空会话
    function clearChat() {
      if (!confirm('确定要清空当前会话吗？')) return;
      
      messages = [];
      sessionId = 'talu-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
      
      // 保留欢迎页和快捷问题
      const welcome = document.getElementById('welcome');
      document.getElementById('messages').innerHTML = '';
      if (welcome) {
        welcome.style.display = 'block';
        const quick = document.getElementById('quickQuestions');
        if (quick) quick.style.display = 'block';
        document.getElementById('messages').appendChild(welcome);
      }
      
      // 清除localStorage
      localStorage.removeItem('talu_ai_session');
      localStorage.removeItem('talu_ai_messages');
      
      // 清除服务器会话
      fetch(API_BASE + '/clear', {
        method: 'POST',
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
        body: new URLSearchParams({ session_id: sessionId })
      });
    }

    // 保存会话到localStorage
    function saveSession() {
      try {
        localStorage.setItem('talu_ai_session', sessionId);
        localStorage.setItem('talu_ai_messages', JSON.stringify(messages.slice(-50))); // 只保存最近50条
      } catch (e) {
        console.warn('无法保存会话:', e);
      }
    }

    // 加载会话
    function loadSession() {
      try {
        const savedSession = localStorage.getItem('talu_ai_session');
        const savedMessages = localStorage.getItem('talu_ai_messages');
        
        if (savedMessages) {
          messages = JSON.parse(savedMessages);
          if (messages.length > 0) {
            hideWelcome();
            messages.forEach(msg => {
              addMessage(msg.role, msg.content, new Date(msg.time));
            });
          }
        }
      } catch (e) {
        console.warn('无法加载会话:', e);
      }
    }
  </script>
</body>
</html>
