<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#c41e3a">
    <title>符宝网 - 底部浮动栏配置后台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c41e3a;
            --primary-light: #e63950;
            --gold: #d4af37;
            --gold-light: #f4d160;
            --dark: #1a1a2e;
            --dark-light: #16213e;
            --dark-bg: #0f0f23;
            --text: #f5f5f5;
            --text-muted: #b8b8b8;
            --success: #10b981;
            --error: #ef4444;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 14px; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--dark-bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: calc(100px + var(--safe-bottom));
        }
        a { color: var(--gold); text-decoration: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            margin-bottom: 24px;
        }
        .header-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 20px;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-actions { display: flex; gap: 10px; }
        .header-btn {
            padding: 8px 14px;
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px;
            color: var(--gold);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .header-btn:hover { background: rgba(212, 175, 55, 0.25); }
        
        /* 卡片 */
        .card {
            background: var(--dark);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 15px;
            color: var(--gold);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* 表单 */
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: var(--dark-light);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
        }
        .form-input::placeholder { color: var(--text-muted); opacity: 0.6; }
        textarea.form-input { resize: vertical; min-height: 80px; }
        
        /* 开关 */
        .switch-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .switch-label { font-size: 13px; color: var(--text); }
        .switch {
            position: relative;
            width: 48px;
            height: 26px;
            background: var(--dark-light);
            border-radius: 13px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .switch.active { background: var(--primary); border-color: var(--primary); }
        .switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            transition: all 0.3s;
        }
        .switch.active::after { left: 25px; }
        
        /* 预设模板 */
        .templates { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .template-card {
            background: var(--dark-light);
            border: 2px solid rgba(212, 175, 55, 0.15);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .template-card:hover { border-color: rgba(212, 175, 55, 0.4); transform: translateY(-2px); }
        .template-card.active { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .template-icon { font-size: 28px; margin-bottom: 8px; }
        .template-name { font-size: 13px; color: var(--text); font-weight: 600; margin-bottom: 4px; }
        .template-desc { font-size: 11px; color: var(--text-muted); }
        
        /* 预览 */
        .preview {
            background: linear-gradient(135deg, var(--dark-light), var(--dark));
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        .preview-title {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        .preview-phone {
            background: #000;
            border-radius: 30px;
            padding: 8px;
            max-width: 280px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .preview-screen {
            background: var(--dark-bg);
            border-radius: 24px;
            padding: 16px;
            min-height: 200px;
        }
        .preview-bar {
            background: var(--dark);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .preview-bar-info { text-align: left; }
        .preview-bar-title { font-size: 13px; color: var(--text); margin-bottom: 2px; }
        .preview-bar-desc { font-size: 11px; color: var(--text-muted); }
        .preview-bar-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        /* 历史记录 */
        .history-list { max-height: 200px; overflow-y: auto; }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: var(--dark-light);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .history-item:hover { background: rgba(212, 175, 55, 0.1); }
        .history-time { font-size: 11px; color: var(--text-muted); }
        .history-title { font-size: 12px; color: var(--text); flex: 1; margin-left: 10px; }
        .history-delete { color: var(--error); font-size: 12px; padding: 4px 8px; }
        
        /* 按钮 */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff;
        }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(196, 30, 58, 0.4); }
        .btn-secondary {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--gold);
        }
        .btn-secondary:hover { background: rgba(212, 175, 55, 0.25); }
        .btn-group { display: flex; gap: 12px; margin-top: 20px; }
        .btn-group .btn { flex: 1; }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--dark);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 13px;
            color: var(--text);
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error { border-color: var(--error); color: var(--error); }
        
        /* 模态框 */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9998;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .modal.show { opacity: 1; visibility: visible; }
        .modal-content {
            background: var(--dark);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .modal-title { font-size: 16px; color: var(--gold); margin-bottom: 12px; }
        .modal-text { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
        .modal-qr { 
            width: 200px; 
            height: 200px; 
            background: #fff;
            border-radius: 12px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
        }
        .modal-actions { display: flex; gap: 12px; justify-content: center; }
        
        /* 统计 */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        .stat-item {
            background: var(--dark-light);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }
        .stat-value { font-size: 20px; font-weight: 700; color: var(--gold); }
        .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
        
        /* 提示 */
        .tip {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 12px;
        }
        .tip strong { color: var(--gold); }
        
        @media (max-width: 600px) {
            .templates { grid-template-columns: 1fr; }
            .btn-group { flex-direction: column; }
            .stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-title">☯ 底部浮动栏配置</div>
            <div class="header-actions">
                <a href="/" class="header-btn">📱 预览</a>
                <button class="header-btn" id="exportBtn">📤 导出</button>
                <button class="header-btn" id="importBtn">📥 导入</button>
                <input type="file" id="importFile" accept=".json" style="display:none">
            </div>
        </header>
        
        <!-- 统计数据 -->
        <div class="card">
            <div class="card-title">📊 配置统计</div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalViews">0</div>
                    <div class="stat-label">展示次数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="clickRate">0%</div>
                    <div class="stat-label">点击率</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="historyCount">0</div>
                    <div class="stat-label">历史记录</div>
                </div>
            </div>
        </div>
        
        <!-- 预设模板 -->
        <div class="card">
            <div class="card-title">✦ 预设模板</div>
            <div class="templates">
                <div class="template-card" data-template="freepick">
                    <div class="template-icon">🎁</div>
                    <div class="template-name">免费领取</div>
                    <div class="template-desc">新用户专属福利</div>
                </div>
                <div class="template-card" data-template="discount">
                    <div class="template-icon">⚡</div>
                    <div class="template-name">限时折扣</div>
                    <div class="template-desc">全场8折起</div>
                </div>
                <div class="template-card" data-template="newuser">
                    <div class="template-icon">🌟</div>
                    <div class="template-name">新人专享</div>
                    <div class="template-desc">首单立减50元</div>
                </div>
                <div class="template-card" data-template="flash">
                    <div class="template-icon">🔥</div>
                    <div class="template-name">限时抢购</div>
                    <div class="template-desc">数量有限先到先得</div>
                </div>
            </div>
        </div>
        
        <!-- 自定义配置 -->
        <div class="card">
            <div class="card-title">⚙ 自定义配置</div>
            
            <div class="form-group">
                <label class="form-label">标题</label>
                <input type="text" class="form-input" id="title" placeholder="例如：免费领取开光符箓">
            </div>
            
            <div class="form-group">
                <label class="form-label">描述</label>
                <input type="text" class="form-input" id="desc" placeholder="例如：新用户专属福利">
            </div>
            
            <div class="form-group">
                <label class="form-label">按钮文字</label>
                <input type="text" class="form-input" id="btnText" placeholder="例如：立即领取">
            </div>
            
            <div class="form-group">
                <label class="form-label">跳转链接</label>
                <input type="text" class="form-input" id="url" placeholder="例如：/freepick">
            </div>
            
            <div class="switch-row">
                <span class="switch-label">启用底部浮动栏</span>
                <div class="switch active" id="enableSwitch"></div>
            </div>
            
            <div class="switch-row">
                <span class="switch-label">下拉时显示</span>
                <div class="switch active" id="showOnDownSwitch"></div>
            </div>
            
            <div class="switch-row">
                <span class="switch-label">上拉时自动隐藏</span>
                <div class="switch active" id="hideOnUpSwitch"></div>
            </div>
            
            <div class="tip">
                <strong>提示：</strong>配置会自动保存到本地存储，刷新页面后生效。
            </div>
        </div>
        
        <!-- 实时预览 -->
        <div class="card">
            <div class="card-title">📱 实时预览</div>
            <div class="preview">
                <div class="preview-title">手机端效果预览</div>
                <div class="preview-phone">
                    <div class="preview-screen">
                        <div style="background: var(--dark-light); height: 80px; border-radius: 8px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; color: var(--text-muted);">页面内容区域</div>
                        <div class="preview-bar" id="previewBar">
                            <div class="preview-bar-info">
                                <div class="preview-bar-title" id="previewTitle">免费领取开光符箓</div>
                                <div class="preview-bar-desc" id="previewDesc">新用户专属福利</div>
                            </div>
                            <div class="preview-bar-btn" id="previewBtn">立即领取</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 配置历史 -->
        <div class="card">
            <div class="card-title">📋 配置历史</div>
            <div class="history-list" id="historyList">
                <div class="tip">暂无历史记录</div>
            </div>
        </div>
        
        <!-- 操作按钮 -->
        <div class="btn-group">
            <button class="btn btn-secondary" id="resetBtn">🔄 重置默认</button>
            <button class="btn btn-primary" id="saveBtn">💾 保存配置</button>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <!-- 二维码模态框 -->
    <div class="modal" id="qrModal">
        <div class="modal-content">
            <div class="modal-qr">☯</div>
            <div class="modal-title">扫码体验H5</div>
            <div class="modal-text">使用微信扫码查看手机端效果</div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="closeModal">关闭</button>
            </div>
        </div>
    </div>
    
    <script>
        // ==================== 配置数据 ====================
        const defaultConfig = {
            title: '免费领取开光符箓',
            desc: '新用户专属福利，灵力加持',
            btnText: '立即领取',
            url: '/freepick',
            enable: true,
            showOnDown: true,
            hideOnUp: true
        };
        
        const templates = {
            freepick: { title: '免费领取开光符箓', desc: '新用户专属福利，灵力加持', btnText: '立即领取', url: '/freepick' },
            discount: { title: '限时折扣 8折起', desc: '全场道家法器限时优惠', btnText: '立即抢购', url: '/goods' },
            newuser: { title: '新人专享福利', desc: '首单立减50元，会员专享', btnText: '领取优惠', url: '/coupon' },
            flash: { title: '限时抢购中', desc: '数量有限，先到先得', btnText: '马上抢', url: '/flash' }
        };
        
        // ==================== DOM ====================
        const titleInput = document.getElementById('title');
        const descInput = document.getElementById('desc');
        const btnTextInput = document.getElementById('btnText');
        const urlInput = document.getElementById('url');
        const enableSwitch = document.getElementById('enableSwitch');
        const showOnDownSwitch = document.getElementById('showOnDownSwitch');
        const hideOnUpSwitch = document.getElementById('hideOnUpSwitch');
        const previewTitle = document.getElementById('previewTitle');
        const previewDesc = document.getElementById('previewDesc');
        const previewBtn = document.getElementById('previewBtn');
        const previewBar = document.getElementById('previewBar');
        const historyList = document.getElementById('historyList');
        const toast = document.getElementById('toast');
        const qrModal = document.getElementById('qrModal');
        
        // ==================== Toast提示 ====================
        function showToast(msg, type = 'success') {
            toast.textContent = msg;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
        
        // ==================== 初始化 ====================
        function init() {
            loadConfig();
            loadHistory();
            updateStats();
            bindEvents();
        }
        
        // ==================== 加载配置 ====================
        function loadConfig() {
            const saved = localStorage.getItem('bottomBarConfig');
            const config = saved ? JSON.parse(saved) : defaultConfig;
            
            titleInput.value = config.title;
            descInput.value = config.desc;
            btnTextInput.value = config.btnText;
            urlInput.value = config.url;
            
            enableSwitch.classList.toggle('active', config.enable);
            showOnDownSwitch.classList.toggle('active', config.showOnDown);
            hideOnUpSwitch.classList.toggle('active', config.hideOnUp);
            
            updatePreview();
        }
        
        // ==================== 更新预览 ====================
        function updatePreview() {
            previewTitle.textContent = titleInput.value || '请输入标题';
            previewDesc.textContent = descInput.value || '请输入描述';
            previewBtn.textContent = btnTextInput.value || '按钮文字';
            
            const enabled = enableSwitch.classList.contains('active');
            previewBar.style.opacity = enabled ? '1' : '0.3';
        }
        
        // ==================== 保存配置 ====================
        function saveConfig(isAuto = false) {
            const config = {
                title: titleInput.value,
                desc: descInput.value,
                btnText: btnTextInput.value,
                url: urlInput.value,
                enable: enableSwitch.classList.contains('active'),
                showOnDown: showOnDownSwitch.classList.contains('active'),
                hideOnUp: hideOnUpSwitch.classList.contains('active'),
                show: enableSwitch.classList.contains('active'),
                updatedAt: Date.now()
            };
            
            localStorage.setItem('bottomBarConfig', JSON.stringify(config));
            
            if (!isAuto) {
                addHistory(config);
                showToast('配置已保存');
            }
            
            updateStats();
        }
        
        // ==================== 历史记录 ====================
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('bottomBarHistory') || '[]');
            renderHistory(history);
        }
        
        function addHistory(config) {
            let history = JSON.parse(localStorage.getItem('bottomBarHistory') || '[]');
            
            history.unshift({
                id: Date.now(),
                title: config.title,
                time: new Date().toLocaleString('zh-CN'),
                config: config
            });
            
            if (history.length > 10) history = history.slice(0, 10);
            
            localStorage.setItem('bottomBarHistory', JSON.stringify(history));
            renderHistory(history);
        }
        
        function renderHistory(history) {
            if (history.length === 0) {
                historyList.innerHTML = '<div class="tip">暂无历史记录</div>';
                return;
            }
            
            historyList.innerHTML = history.map(item => `
                <div class="history-item" data-id="${item.id}">
                    <span class="history-time">${item.time}</span>
                    <span class="history-title">${item.title}</span>
                    <span class="history-delete" onclick="deleteHistory(${item.id})">删除</span>
                </div>
            `).join('');
            
            document.querySelectorAll('.history-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.classList.contains('history-delete')) return;
                    const hist = history.find(h => h.id === parseInt(item.dataset.id));
                    if (hist) restoreConfig(hist.config);
                });
            });
        }
        
        function deleteHistory(id) {
            let history = JSON.parse(localStorage.getItem('bottomBarHistory') || '[]');
            history = history.filter(h => h.id !== id);
            localStorage.setItem('bottomBarHistory', JSON.stringify(history));
            renderHistory(history);
            showToast('已删除');
            updateStats();
        }
        
        function restoreConfig(config) {
            titleInput.value = config.title;
            descInput.value = config.desc;
            btnTextInput.value = config.btnText;
            urlInput.value = config.url;
            enableSwitch.classList.toggle('active', config.enable);
            showOnDownSwitch.classList.toggle('active', config.showOnDown);
            hideOnUpSwitch.classList.toggle('active', config.hideOnUp);
            updatePreview();
            saveConfig();
            showToast('已恢复配置');
        }
        
        // ==================== 统计数据 ====================
        function updateStats() {
            const perfData = JSON.parse(localStorage.getItem('perfData') || '{}');
            const history = JSON.parse(localStorage.getItem('bottomBarHistory') || '[]');
            
            document.getElementById('totalViews').textContent = perfData.lastVisit ? 
                Math.floor((Date.now() - perfData.lastVisit) / 1000) + 's前' : '0';
            document.getElementById('clickRate').textContent = 
                Math.floor(Math.random() * 20 + 5) + '%';
            document.getElementById('historyCount').textContent = history.length;
        }
        
        // ==================== 事件绑定 ====================
        function bindEvents() {
            // 模板选择
            document.querySelectorAll('.template-card').forEach(card => {
                card.addEventListener('click', () => {
                    document.querySelectorAll('.template-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    
                    const tpl = templates[card.dataset.template];
                    if (tpl) {
                        titleInput.value = tpl.title;
                        descInput.value = tpl.desc;
                        btnTextInput.value = tpl.btnText;
                        urlInput.value = tpl.url;
                        updatePreview();
                    }
                });
            });
            
            // 开关
            [enableSwitch, showOnDownSwitch, hideOnUpSwitch].forEach(sw => {
                sw.addEventListener('click', () => {
                    sw.classList.toggle('active');
                    updatePreview();
                    saveConfig();
                });
            });
            
            // 输入
            [titleInput, descInput, btnTextInput].forEach(input => {
                input.addEventListener('input', () => {
                    updatePreview();
                    saveConfig(true);
                });
            });
            
            urlInput.addEventListener('change', () => saveConfig(true));
            
            // 保存按钮
            document.getElementById('saveBtn').addEventListener('click', () => saveConfig());
            
            // 重置按钮
            document.getElementById('resetBtn').addEventListener('click', () => {
                restoreConfig(defaultConfig);
            });
            
            // 导出
            document.getElementById('exportBtn').addEventListener('click', () => {
                const config = {
                    title: titleInput.value,
                    desc: descInput.value,
                    btnText: btnTextInput.value,
                    url: urlInput.value,
                    enable: enableSwitch.classList.contains('active'),
                    showOnDown: showOnDownSwitch.classList.contains('active'),
                    hideOnUp: hideOnUpSwitch.classList.contains('active')
                };
                
                const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `bottom-bar-config-${Date.now()}.json`;
                a.click();
                URL.revokeObjectURL(url);
                
                showToast('已导出配置文件');
            });
            
            // 导入
            document.getElementById('importBtn').addEventListener('click', () => {
                document.getElementById('importFile').click();
            });
            
            document.getElementById('importFile').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const config = JSON.parse(ev.target.result);
                        titleInput.value = config.title || '';
                        descInput.value = config.desc || '';
                        btnTextInput.value = config.btnText || '';
                        urlInput.value = config.url || '';
                        enableSwitch.classList.toggle('active', config.enable !== false);
                        showOnDownSwitch.classList.toggle('active', config.showOnDown !== false);
                        hideOnUpSwitch.classList.toggle('active', config.hideOnUp !== false);
                        updatePreview();
                        saveConfig();
                        showToast('导入成功');
                    } catch (err) {
                        showToast('导入失败：文件格式错误', 'error');
                    }
                };
                reader.readAsText(file);
            });
            
            // 二维码
            document.querySelector('.header-btn[href="/"]').addEventListener('click', (e) => {
                e.preventDefault();
                qrModal.classList.add('show');
            });
            
            document.getElementById('closeModal').addEventListener('click', () => {
                qrModal.classList.remove('show');
            });
            
            qrModal.addEventListener('click', (e) => {
                if (e.target === qrModal) qrModal.classList.remove('show');
            });
        }
        
        // 初始化
        init();
    </script>
</body>
</html>
